<!DOCTYPE html>
<html>
<head>
<title>NEXUS SOC Login</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>NEXUS SOC</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

const API = "http://127.0.0.1:8000";

async function login(){

const username = document.getElementById("username").value;

const password = document.getElementById("password").value;

const res = await fetch(API + "/api/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username:username,
password:password
})

});

const data = await res.json();

if(data.status==="success"){
window.location.href="index.html";
}
else{
alert("Login failed");
}

}

</script>

</body>
</html>
