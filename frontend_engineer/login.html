<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS SOC — Strict Sequential MFA</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #030712;
    --bg-deep: #070e1a;
    --bg-panel: #0a1628;
    --bg-card: #0d1f35;
    --border-dim: rgba(0,200,255,0.1);
    --border-glow: rgba(0,200,255,0.35);
    --cyan: #00c8ff;
    --green: #00ff88;
    --red: #ff3860;
    --amber: #ffb300;
    --text-primary: #e0f4ff;
    --text-secondary: rgba(200,230,255,0.55);
    --text-dim: rgba(200,230,255,0.3);
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Rajdhani', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Scanlines & Grid */
  body::before {
    content:''; position:fixed; inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,200,255,0.012) 2px, rgba(0,200,255,0.012) 4px);
    pointer-events:none; z-index:9999;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size:60px 60px; pointer-events:none; z-index:0;
  }

  .orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; animation: orb-drift 12s ease-in-out infinite; }
  .orb-1 { width:400px; height:400px; background:rgba(0,200,255,0.04); top:-100px; left:-100px; }
  .orb-2 { width:300px; height:300px; background:rgba(168,85,247,0.05); bottom:-50px; right:-50px; animation-delay:-6s; }
  .orb-3 { width:200px; height:200px; background:rgba(255,56,96,0.03); top:50%; left:50%; animation-delay:-3s; }

  @keyframes orb-drift { 0%,100% { transform:translate(0,0); } 33% { transform:translate(30px,-20px); } 66% { transform:translate(-20px,30px); } }

  .login-wrapper { position:relative; z-index:1; width:100%; max-width:460px; padding:20px; animation: fade-up 0.6s ease forwards; }
  @keyframes fade-up { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

  .login-header { text-align:center; margin-bottom:32px; }
  .logo-ring { width:72px; height:72px; border:2px solid var(--cyan); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; position:relative; box-shadow: 0 0 30px rgba(0,200,255,0.3), inset 0 0 20px rgba(0,200,255,0.06); animation: logo-pulse 3s ease-in-out infinite; }
  @keyframes logo-pulse { 0%,100% { box-shadow: 0 0 30px rgba(0,200,255,0.3), inset 0 0 20px rgba(0,200,255,0.06); } 50% { box-shadow: 0 0 50px rgba(0,200,255,0.5), inset 0 0 30px rgba(0,200,255,0.12); } }
  .logo-ring::before { content:'⬡'; font-size:32px; color:var(--cyan); text-shadow:0 0 16px var(--cyan); }
  .logo-ring::after { content:''; position:absolute; inset:-6px; border-radius:20px; border:1px solid transparent; border-top-color:rgba(0,200,255,0.4); border-right-color:rgba(0,200,255,0.2); animation:spin 4s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .login-title { font-family:var(--font-display); font-size:22px; font-weight:900; letter-spacing:6px; color:var(--cyan); text-shadow:0 0 24px rgba(0,200,255,0.4); margin-bottom:6px; }
  .login-subtitle { font-family:var(--font-mono); font-size:10px; color:var(--text-dim); letter-spacing:3px; text-transform:uppercase; }

  .login-card { background:var(--bg-panel); border:1px solid var(--border-dim); border-radius:16px; padding:32px; position:relative; overflow:hidden; box-shadow:0 0 60px rgba(0,0,0,0.5); }
  .login-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, transparent, var(--cyan), transparent); box-shadow:0 0 12px var(--cyan); }

  .corner { position:absolute; width:20px; height:20px; }
  .corner.tl { top:10px; left:10px; border-top:1px solid var(--border-glow); border-left:1px solid var(--border-glow); }
  .corner.tr { top:10px; right:10px; border-top:1px solid var(--border-glow); border-right:1px solid var(--border-glow); }
  .corner.bl { bottom:10px; left:10px; border-bottom:1px solid var(--border-glow); border-left:1px solid var(--border-glow); }
  .corner.br { bottom:10px; right:10px; border-bottom:1px solid var(--border-glow); border-right:1px solid var(--border-glow); }

  /* MFA PROGRESS TRACKER */
  .mfa-tracker { display:flex; justify-content:space-between; margin-bottom:24px; position:relative; }
  .mfa-tracker::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:var(--border-dim); z-index:1; }
  .mfa-step { position:relative; z-index:2; background:var(--bg-panel); padding:0 8px; font-family:var(--font-mono); font-size:9px; color:var(--text-dim); transition:all 0.3s; }
  .mfa-step.active { color:var(--cyan); text-shadow:0 0 8px var(--cyan); font-weight:bold; }
  .mfa-step.completed { color:var(--green); }

  .form-group { margin-bottom:18px; }
  .form-label { font-family:var(--font-mono); font-size:9px; color:var(--text-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:block; }
  .form-input { width:100%; background:var(--bg-card); border:1px solid var(--border-dim); border-radius:8px; padding:12px 16px; color:var(--text-primary); font-family:var(--font-mono); font-size:13px; outline:none; transition:all 0.2s; letter-spacing:1px; }
  .form-input:focus { border-color:rgba(0,200,255,0.4); background:rgba(0,200,255,0.04); box-shadow:0 0 16px rgba(0,200,255,0.08); }
  .input-wrap { position:relative; }
  .input-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--text-dim); cursor:pointer; font-size:14px; transition:color 0.2s; user-select:none; }
  .input-icon:hover { color:var(--cyan); }

  /* Section containers */
  .step-container { display: none; animation: fade-up 0.4s ease forwards; }
  .step-container.active { display: block; }

  /* Biometric scanner */
  .bio-panel { display:flex; flex-direction:column; align-items:center; padding:30px; border:1px solid var(--border-dim); border-radius:8px; background:var(--bg-card); margin-bottom:18px; gap:16px; }
  .bio-scanner { width:90px; height:90px; border:2px solid var(--cyan); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:42px; position:relative; box-shadow:0 0 20px rgba(0,200,255,0.2); cursor:pointer; transition:all 0.3s; }
  .bio-scanner:hover { box-shadow:0 0 30px rgba(0,200,255,0.4); }
  .bio-scanner.scanning::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--cyan); box-shadow:0 0 8px var(--cyan); animation:scan-line 1.5s ease-in-out infinite; }
  .bio-status { font-family:var(--font-mono); font-size:11px; color:var(--cyan); letter-spacing:2px; text-align:center; }

  /* Pattern grid */
  .pattern-grid { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:18px; }
  .pattern-dots { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; padding:20px; border:1px solid var(--border-dim); border-radius:8px; background:var(--bg-card); }
  .pattern-dot { width:28px; height:28px; border-radius:50%; border:2px solid var(--border-dim); background:var(--bg-panel); cursor:pointer; transition:all 0.15s; position:relative; }
  .pattern-dot:hover { border-color:rgba(0,200,255,0.5); }
  .pattern-dot.selected { border-color:var(--cyan); background:rgba(0,200,255,0.2); box-shadow:0 0 10px rgba(0,200,255,0.3); }
  .pattern-display { font-family:var(--font-mono); font-size:10px; color:var(--cyan); letter-spacing:3px; min-height:16px; text-align:center; }

  .btn-login { width:100%; padding:14px; background:linear-gradient(135deg, rgba(0,200,255,0.15), rgba(0,200,255,0.08)); border:1px solid rgba(0,200,255,0.4); border-radius:8px; color:var(--cyan); font-family:var(--font-display); font-size:12px; font-weight:700; letter-spacing:4px; cursor:pointer; transition:all 0.3s; text-transform:uppercase; position:relative; overflow:hidden; margin-top:8px; }
  .btn-login:hover { background:linear-gradient(135deg, rgba(0,200,255,0.25), rgba(0,200,255,0.15)); box-shadow:0 0 24px rgba(0,200,255,0.25); transform:translateY(-1px); }
  .btn-login.loading { pointer-events:none; opacity:0.7; }

  .status-msg { display:none; padding:10px 14px; border-radius:6px; font-family:var(--font-mono); font-size:10px; letter-spacing:1px; margin-bottom:14px; align-items:center; gap:8px; }
  .status-msg.show { display:flex; }
  .status-msg.error { background:rgba(255,56,96,0.1); border:1px solid rgba(255,56,96,0.3); color:var(--red); }
  .status-msg.success { background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.3); color:var(--green); }

  .login-footer { margin-top:20px; text-align:center; font-family:var(--font-mono); font-size:9px; color:var(--text-dim); letter-spacing:2px; line-height:2; }
  .security-row { display:flex; justify-content:center; gap:20px; margin-top:16px; }
  .sec-badge { display:flex; align-items:center; gap:5px; font-family:var(--font-mono); font-size:9px; color:var(--text-dim); letter-spacing:1px; }
  .sec-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-wrapper">

  <div class="login-header">
    <div class="logo-ring"></div>
    <div class="login-title">NEXUS SOC</div>
    <div class="login-subtitle">Zero-Trust Authentication Pipeline</div>
  </div>

  <div class="login-card">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="mfa-tracker">
      <div class="mfa-step active" id="nav-step-1">1. CREDENTIALS</div>
      <div class="mfa-step" id="nav-step-2">2. HARDWARE</div>
      <div class="mfa-step" id="nav-step-3">3. PATTERN</div>
    </div>

    <div class="status-msg" id="status-msg">
      <span id="status-icon">⚠</span>
      <span id="status-text"></span>
    </div>

    <div class="step-container active" id="step-1">
      <div class="form-group">
        <label class="form-label">User ID / Employee Code</label>
        <div class="input-wrap">
          <input type="text" class="form-input" id="user-id" placeholder="USR_XXXX" autocomplete="off"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="password" placeholder="Enter secure password"/>
          <span class="input-icon" onclick="togglePassword()">👁</span>
        </div>
      </div>
      <button class="btn-login" id="btn-step-1" onclick="processStep1()">▶ VERIFY CREDENTIALS</button>
    </div>

    <div class="step-container" id="step-2">
      <div class="bio-panel">
        <div class="bio-scanner" id="fp-scanner" onclick="triggerHardwareFingerprint()">👆</div>
        <div class="bio-status" id="fp-status">CLICK TO WAKE SCANNER</div>
      </div>
      <p style="text-align:center; font-family:var(--font-mono); font-size:10px; color:var(--text-dim); margin-bottom:10px;">
        Awaiting OS-level biometric verification.
      </p>
    </div>

    <div class="step-container" id="step-3">
      <div class="pattern-grid">
        <div class="pattern-dots" id="pattern-dots"></div>
        <div class="pattern-display" id="pattern-display">DRAW YOUR PATTERN</div>
      </div>
      <button class="btn-login" id="btn-step-3" onclick="processStep3()">▶ COMPLETE LOGIN</button>
    </div>

  </div>

  <div class="login-footer">
    <div class="security-row">
      <div class="sec-badge"><div class="sec-dot"></div> TLS 1.3</div>
      <div class="sec-badge"><div class="sec-dot"></div> WebAuthn Level 2</div>
      <div class="sec-badge"><div class="sec-dot"></div> Zero-Trust</div>
    </div>
    <div style="margin-top:10px;">NEXUS SOC v4.2.1 · STRICT SEQUENCE ENFORCED</div>
  </div>

</div>

<script>
const BACKEND_URL = "http://localhost:8000";
let patternSequence = [];

// ── UI HELPERS ──────────────────────────────────────────────
function showStatus(type, text) {
  const msg  = document.getElementById('status-msg');
  const icon = document.getElementById('status-icon');
  const txt  = document.getElementById('status-text');
  const icons = { error:'✗', success:'✓', warning:'⚠' };
  msg.className = `status-msg show ${type}`;
  icon.textContent = icons[type] || '●';
  txt.textContent  = text;
}

function hideStatus() {
  document.getElementById('status-msg').className = 'status-msg';
}

function togglePassword() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}

function getDeviceId() {
  let id = localStorage.getItem('nexus_device_id');
  if (!id) {
    id = 'DEV_' + Math.random().toString(36).substr(2,8).toUpperCase();
    localStorage.setItem('nexus_device_id', id);
  }
  return id;
}

// ── STEP 1: CREDENTIALS ─────────────────────────────────────
function processStep1() {
  const userId = document.getElementById('user-id').value.trim();
  const pass = document.getElementById('password').value.trim();
  const btn = document.getElementById('btn-step-1');

  if (!userId || !pass) {
    showStatus('error', 'USER ID AND PASSWORD REQUIRED');
    return;
  }

  btn.classList.add('loading');
  btn.textContent = '⟳ VERIFYING...';
  hideStatus();

  // Simulate quick backend credential check
  setTimeout(() => {
    btn.classList.remove('loading');
    btn.textContent = '▶ VERIFY CREDENTIALS';
    
    // Transition to Step 2
    document.getElementById('step-1').classList.remove('active');
    document.getElementById('step-2').classList.add('active');
    
    // Update Progress Bar
    document.getElementById('nav-step-1').classList.remove('active');
    document.getElementById('nav-step-1').classList.add('completed');
    document.getElementById('nav-step-2').classList.add('active');
  }, 800);
}

// ── STEP 2: HARDWARE FINGERPRINT ────────────────────────────
async function triggerHardwareFingerprint() {
  const scanner = document.getElementById('fp-scanner');
  const status = document.getElementById('fp-status');

  if (!window.PublicKeyCredential) {
    showStatus('error', 'BIOMETRICS NOT SUPPORTED ON THIS BROWSER');
    return;
  }

  scanner.classList.add('scanning');
  status.textContent = 'WAITING FOR OS SENSOR...';
  status.style.color = 'var(--amber)';
  hideStatus();

  try {
    const publicKeyOptions = {
      challenge: new Uint8Array(32),
      rp: { name: "NEXUS SOC Demo", id: "localhost" },
      user: {
        id: new Uint8Array(16),
        name: "admin@nexus-soc.local",
        displayName: "SOC Administrator"
      },
      pubKeyCredParams: [{alg: -7, type: "public-key"}],
      authenticatorSelection: {
        authenticatorAttachment: "platform", // Forces laptop scanner
        userVerification: "required"
      },
      timeout: 60000
    };

    // Trigger Windows Hello / Mac TouchID
    await navigator.credentials.create({ publicKey: publicKeyOptions });

    // Success!
    scanner.classList.remove('scanning');
    status.textContent = '✓ BIOMETRIC VERIFIED';
    status.style.color = 'var(--green)';
    scanner.style.borderColor = 'var(--green)';
    scanner.style.boxShadow   = '0 0 20px rgba(0,255,136,0.3)';

    // Auto-advance to Step 3 after a tiny delay for visual feedback
    setTimeout(() => {
      document.getElementById('step-2').classList.remove('active');
      document.getElementById('step-3').classList.add('active');
      
      document.getElementById('nav-step-2').classList.remove('active');
      document.getElementById('nav-step-2').classList.add('completed');
      document.getElementById('nav-step-3').classList.add('active');
      
      buildPatternDots();
    }, 1200);

  } catch (err) {
    scanner.classList.remove('scanning');
    status.textContent = '✗ OS SCAN CANCELLED OR FAILED';
    status.style.color = 'var(--red)';
    scanner.style.borderColor = 'var(--red)';
    showStatus('error', 'BIOMETRIC VERIFICATION FAILED. TRY AGAIN.');
  }
}

// ── STEP 3: PATTERN & BACKEND LOGIN ─────────────────────────
function buildPatternDots() {
  patternSequence = [];
  const grid = document.getElementById('pattern-dots');
  grid.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const dot = document.createElement('div');
    dot.className = 'pattern-dot';
    dot.dataset.i = i;
    dot.onclick = () => selectDot(i, dot);
    grid.appendChild(dot);
  }
}

function selectDot(index, dot) {
  if (patternSequence.includes(index)) return;
  patternSequence.push(index);
  dot.classList.add('selected');
  const display = document.getElementById('pattern-display');
  display.textContent = '● '.repeat(patternSequence.length).trim();
  
  if (patternSequence.length >= 4) {
    display.style.color = 'var(--green)';
    display.textContent += '  ✓ PATTERN SET';
  }
}

async function processStep3() {
  const userId = document.getElementById('user-id').value.trim();
  const btn = document.getElementById('btn-step-3');

  if (patternSequence.length < 4) {
    showStatus('error', 'PATTERN MUST CONNECT AT LEAST 4 DOTS');
    return;
  }

  btn.classList.add('loading');
  btn.textContent = '⟳ EXECUTING FINAL AUTHENTICATION...';
  hideStatus();

  const payload = {
    user_id:     userId,
    auth_method: 'MULTI_FACTOR', // Tell the backend all 3 passed
    device_id:   getDeviceId(),
    ip_address:  '127.0.0.1',
    location:    'Local'
  };

  try {
    const res = await fetch(`${BACKEND_URL}/api/auth/login`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });

    const data = await res.json();

    if (res.status === 403) {
      showStatus('error', 'ACCESS DENIED — IP BLOCKED');
      btn.classList.remove('loading');
      btn.textContent = '▶ COMPLETE LOGIN';
      return;
    }

    if (data.success) {
      showStatus('success', `ZERO-TRUST VERIFIED — ANOMALY SCORE: ${data.anomaly_score}`);
      btn.textContent = '✓ SECURE LOGIN SUCCESSFUL';
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
      return;
    }

  } catch (err) {
    // Demo fallback if backend drops
    showStatus('success', 'ZERO-TRUST VERIFIED — REDIRECTING (DEMO MODE)');
    btn.textContent = '✓ SECURE LOGIN SUCCESSFUL';
    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
  }
}
</script>
</body>
</html>
